<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Two Numbers</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f7fb;
        color: #182231;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        background: #ffffff;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        box-shadow: 0 20px 50px rgba(24, 34, 49, 0.12);
        padding: 28px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 28px;
        line-height: 1.15;
      }

      label {
        display: block;
        margin: 16px 0 8px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid #b7c4d6;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      input:focus {
        outline: 3px solid #cde8db;
        border-color: #217a58;
      }

      button {
        width: 100%;
        min-height: 46px;
        margin-top: 22px;
        border: 0;
        border-radius: 6px;
        background: #217a58;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #195f45;
      }

      output {
        display: block;
        min-height: 48px;
        margin-top: 20px;
        padding: 14px;
        border-radius: 6px;
        background: #eef7f2;
        color: #123a2b;
        font-size: 20px;
        font-weight: 700;
      }

      .error {
        background: #fff1f1;
        color: #8b1d1d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Add Two Numbers</h1>

      <form id="addition-form">
        <label for="first-number">First number</label>
        <input id="first-number" name="first-number" type="text" inputmode="decimal" required>

        <label for="second-number">Second number</label>
        <input id="second-number" name="second-number" type="text" inputmode="decimal" required>

        <button type="submit">Add Numbers</button>
      </form>

      <output id="result" for="first-number second-number">Result will appear here.</output>
    </main>

    <script>
      const form = document.querySelector("#addition-form");
      const firstNumber = document.querySelector("#first-number");
      const secondNumber = document.querySelector("#second-number");
      const result = document.querySelector("#result");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const firstValue = Number(firstNumber.value);
        const secondValue = Number(secondNumber.value);

        if (!Number.isFinite(firstValue) || !Number.isFinite(secondValue)) {
          result.textContent = "Please enter two valid numbers.";
          result.classList.add("error");
          return;
        }

        result.textContent = `${firstValue} + ${secondValue} = ${firstValue + secondValue}`;
        result.classList.remove("error");
      });
    </script>
  </body>
</html>
